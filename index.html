<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد باركود QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            animation: float 25s linear infinite;
            bottom: -150px;
            border-radius: 4px;
        }

        .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-animation span:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .bg-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bg-animation span:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .bg-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bg-animation span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bg-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bg-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            padding-right: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            direction: ltr;
            text-align: left;
        }

        .input-wrapper input[type="text"]:focus {
            outline: none;
            border-color: #3a7bd5;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(58, 123, 213, 0.2);
        }

        .input-wrapper .icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
        }

        /* Logo upload */
        .logo-upload {
            margin-bottom: 25px;
        }

        .logo-options {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .logo-option {
            flex: 1;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-family: 'Tajawal', sans-serif;
        }

        .logo-option:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .logo-option.active {
            border-color: #3a7bd5;
            background: rgba(58, 123, 213, 0.2);
        }

        .logo-option input {
            display: none;
        }

        .file-upload-area {
            display: none;
            padding: 30px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .file-upload-area.show {
            display: block;
        }

        .file-upload-area:hover {
            border-color: #3a7bd5;
            background: rgba(58, 123, 213, 0.1);
        }

        .file-upload-area.has-file {
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }

        .file-upload-area input {
            display: none;
        }

        .file-upload-area .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .file-upload-area p {
            color: rgba(255, 255, 255, 0.7);
        }

        .file-upload-area .file-name {
            color: #00d2ff;
            font-weight: 500;
            margin-top: 10px;
        }

        /* Size selector */
        .size-selector {
            margin-bottom: 25px;
        }

        .size-options {
            display: flex;
            gap: 10px;
        }

        .size-option {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.9rem;
        }

        .size-option:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .size-option.active {
            border-color: #3a7bd5;
            background: rgba(58, 123, 213, 0.2);
        }

        /* Generate button */
        .generate-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(58, 123, 213, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .generate-btn:hover::before {
            left: 100%;
        }

        /* QR Result */
        .qr-result {
            display: none;
            margin-top: 30px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .qr-result.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-container {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qrcode canvas,
        #qrcode img {
            border-radius: 8px;
        }

        .qr-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 14px 28px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
        }

        .action-btn.primary:hover {
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
        }

        /* Color picker */
        .color-pickers {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .color-picker-group {
            flex: 1;
        }

        .color-picker-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .color-input-wrapper input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
        }

        .color-input-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-input-wrapper input[type="color"]::-webkit-color-swatch {
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .color-input-wrapper span {
            font-family: monospace;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 25px;
            }

            .logo-options {
                flex-direction: column;
            }

            .size-options {
                flex-wrap: wrap;
            }

            .size-option {
                flex: 1 1 45%;
            }

            .color-pickers {
                flex-direction: column;
            }

            .qr-actions {
                flex-direction: column;
            }

            .action-btn {
                justify-content: center;
            }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 16px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
            pointer-events: auto;
            min-width: 260px;
            max-width: 380px;
            text-align: center;
            justify-content: center;
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .toast.success {
            background: linear-gradient(135deg, rgba(0, 210, 130, 0.25), rgba(0, 180, 110, 0.15));
            border-color: rgba(0, 210, 130, 0.35);
        }

        .toast.error {
            background: linear-gradient(135deg, rgba(255, 80, 80, 0.25), rgba(200, 50, 50, 0.15));
            border-color: rgba(255, 80, 80, 0.35);
        }

        .toast.info {
            background: linear-gradient(135deg, rgba(58, 123, 213, 0.25), rgba(0, 210, 255, 0.15));
            border-color: rgba(58, 123, 213, 0.35);
        }

        .toast-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .toast.hide {
            animation: toastOut 0.35s ease forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(10px) scale(0.92);
            }
        }

        /* Preview logo */
        .logo-preview {
            display: none;
            margin-top: 15px;
            text-align: center;
        }

        .logo-preview.show {
            display: block;
        }

        .logo-preview img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .logo-preview .remove-logo {
            display: block;
            margin-top: 8px;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logo-preview .remove-logo:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="container">
        <div class="header">
            <h1>🔳 مولد باركود QR</h1>
            <p>حوّل أي رابط إلى باركود دائم مع إمكانية إضافة شعارك</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>🔗 أدخل الرابط</label>
                <div class="input-wrapper">
                    <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off">
                    <span class="icon">🌐</span>
                </div>
            </div>

            <div class="logo-upload">
                <label>🖼️ هل تريد إضافة شعار؟</label>
                <div class="logo-options">
                    <div class="logo-option active" onclick="selectLogoOption('none')">
                        <span>❌ بدون شعار</span>
                    </div>
                    <div class="logo-option" onclick="selectLogoOption('with')">
                        <span>✅ مع شعار</span>
                    </div>
                </div>
                <div class="file-upload-area" id="fileUploadArea" onclick="document.getElementById('logoInput').click()">
                    <input type="file" id="logoInput" accept="image/*" onchange="handleLogoUpload(event)">
                    <div class="upload-icon">📁</div>
                    <p>اضغط لرفع الشعار أو اسحبه هنا</p>
                    <p class="file-name" id="fileName"></p>
                </div>
                <div class="logo-preview" id="logoPreview">
                    <img id="logoPreviewImg" src="" alt="Logo Preview">
                    <span class="remove-logo" onclick="removeLogo()">❌ إزالة الشعار</span>
                </div>
            </div>

            <div class="color-pickers">
                <div class="color-picker-group">
                    <label>🎨 لون الباركود</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="qrColor" value="#000000" onchange="updateColorDisplay('qrColor')">
                        <span id="qrColorHex">#000000</span>
                    </div>
                </div>
                <div class="color-picker-group">
                    <label>🎨 لون الخلفية</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="bgColor" value="#ffffff" onchange="updateColorDisplay('bgColor')">
                        <span id="bgColorHex">#ffffff</span>
                    </div>
                </div>
            </div>

            <div class="size-selector">
                <label>📐 حجم الباركود</label>
                <div class="size-options">
                    <div class="size-option" onclick="selectSize(150)">صغير<br><small>150px</small></div>
                    <div class="size-option active" onclick="selectSize(250)">متوسط<br><small>250px</small></div>
                    <div class="size-option" onclick="selectSize(350)">كبير<br><small>350px</small></div>
                    <div class="size-option" onclick="selectSize(500)">كبير جداً<br><small>500px</small></div>
                </div>
            </div>

            <button class="generate-btn" onclick="generateQR()">
                ⚡ توليد الباركود
            </button>

            <div class="qr-result" id="qrResult">
                <div class="qr-container">
                    <div id="qrcode"></div>
                    <canvas id="qrCanvas" style="display: none;"></canvas>
                </div>
                <div class="qr-actions">
                    <button class="action-btn primary" onclick="downloadQR('png')">
                        📥 تحميل PNG
                    </button>
                    <button class="action-btn" onclick="downloadQR('jpg')">
                        📥 تحميل JPG
                    </button>
                    <button class="action-btn" onclick="copyQR()">
                        📋 نسخ الصورة
                    </button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>الباركود المُولَّد دائم ولا ينتهي ✨</p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let qrCode = null;
        let selectedSize = 250;
        let logoFile = null;
        let useLogo = false;

        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const icons = { success: '✅', error: '❌', info: '💡' };
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove());
            }, duration);
        }

        function selectLogoOption(option) {
            document.querySelectorAll('.logo-option').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const uploadArea = document.getElementById('fileUploadArea');
            if (option === 'with') {
                useLogo = true;
                uploadArea.classList.add('show');
            } else {
                useLogo = false;
                uploadArea.classList.remove('show');
                removeLogo();
            }
        }

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                logoFile = file;
                const fileName = document.getElementById('fileName');
                fileName.textContent = file.name;
                document.getElementById('fileUploadArea').classList.add('has-file');
                
                // Show preview
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('logoPreviewImg').src = e.target.result;
                    document.getElementById('logoPreview').classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        }

        function removeLogo() {
            logoFile = null;
            document.getElementById('logoInput').value = '';
            document.getElementById('fileName').textContent = '';
            document.getElementById('fileUploadArea').classList.remove('has-file');
            document.getElementById('logoPreview').classList.remove('show');
        }

        function selectSize(size) {
            selectedSize = size;
            document.querySelectorAll('.size-option').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function updateColorDisplay(inputId) {
            const input = document.getElementById(inputId);
            const display = document.getElementById(inputId + 'Hex');
            display.textContent = input.value;
        }

        function generateQR() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showToast('الرجاء إدخال رابط صحيح', 'error');
                return;
            }

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';

            const qrColor = document.getElementById('qrColor').value;
            const bgColor = document.getElementById('bgColor').value;

            // Create QR code
            qrCode = new QRCode(qrContainer, {
                text: url,
                width: selectedSize,
                height: selectedSize,
                colorDark: qrColor,
                colorLight: bgColor,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Wait for QR code to be generated
            setTimeout(() => {
                if (useLogo && logoFile) {
                    addLogoToQR();
                } else {
                    document.getElementById('qrResult').classList.add('show');
                }
            }, 100);
        }

        function addLogoToQR() {
            const qrContainer = document.getElementById('qrcode');
            const qrImage = qrContainer.querySelector('img') || qrContainer.querySelector('canvas');
            
            if (!qrImage) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = selectedSize;
            canvas.height = selectedSize;

            // Draw QR code
            const qrImg = new Image();
            qrImg.onload = function() {
                ctx.drawImage(qrImg, 0, 0, selectedSize, selectedSize);

                // Draw logo
                const logoImg = new Image();
                logoImg.onload = function() {
                    const logoSize = selectedSize * 0.25;
                    const logoX = (selectedSize - logoSize) / 2;
                    const logoY = (selectedSize - logoSize) / 2;

                    // Draw white background for logo
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.roundRect(logoX - 8, logoY - 8, logoSize + 16, logoSize + 16, 10);
                    ctx.fill();

                    // Draw logo
                    ctx.save();
                    ctx.beginPath();
                    ctx.roundRect(logoX, logoY, logoSize, logoSize, 8);
                    ctx.clip();
                    ctx.drawImage(logoImg, logoX, logoY, logoSize, logoSize);
                    ctx.restore();

                    // Replace QR code with canvas
                    qrContainer.innerHTML = '';
                    qrContainer.appendChild(canvas);
                    
                    document.getElementById('qrResult').classList.add('show');
                };

                const reader = new FileReader();
                reader.onload = function(e) {
                    logoImg.src = e.target.result;
                };
                reader.readAsDataURL(logoFile);
            };

            if (qrImage.tagName === 'CANVAS') {
                qrImg.src = qrImage.toDataURL();
            } else {
                qrImg.src = qrImage.src;
            }
        }

        function downloadQR(format) {
            const qrContainer = document.getElementById('qrcode');
            let canvas = qrContainer.querySelector('canvas');
            
            if (!canvas) {
                const img = qrContainer.querySelector('img');
                if (!img) return;
                
                canvas = document.createElement('canvas');
                canvas.width = selectedSize;
                canvas.height = selectedSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, selectedSize, selectedSize);
            }

            const link = document.createElement('a');
            const timestamp = Date.now();
            
            if (format === 'png') {
                link.download = `qrcode_${timestamp}.png`;
                link.href = canvas.toDataURL('image/png');
            } else {
                link.download = `qrcode_${timestamp}.jpg`;
                // Create white background for JPG
                const jpgCanvas = document.createElement('canvas');
                jpgCanvas.width = canvas.width;
                jpgCanvas.height = canvas.height;
                const jpgCtx = jpgCanvas.getContext('2d');
                jpgCtx.fillStyle = '#ffffff';
                jpgCtx.fillRect(0, 0, jpgCanvas.width, jpgCanvas.height);
                jpgCtx.drawImage(canvas, 0, 0);
                link.href = jpgCanvas.toDataURL('image/jpeg', 0.95);
            }
            
            link.click();
        }

        async function copyQR() {
            const qrContainer = document.getElementById('qrcode');
            let canvas = qrContainer.querySelector('canvas');
            
            if (!canvas) {
                const img = qrContainer.querySelector('img');
                if (!img) return;
                
                canvas = document.createElement('canvas');
                canvas.width = selectedSize;
                canvas.height = selectedSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, selectedSize, selectedSize);
            }

            try {
                canvas.toBlob(async (blob) => {
                    await navigator.clipboard.write([
                        new ClipboardItem({ 'image/png': blob })
                    ]);
                    showToast('تم نسخ الباركود بنجاح!', 'success');
                });
            } catch (err) {
                showToast('عذراً، لا يمكن نسخ الصورة في هذا المتصفح', 'error');
            }
        }

        // Drag and drop support
        const uploadArea = document.getElementById('fileUploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#3a7bd5';
            uploadArea.style.background = 'rgba(58, 123, 213, 0.2)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            uploadArea.style.background = '';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('logoInput').files = e.dataTransfer.files;
                handleLogoUpload({ target: { files: [file] } });
            }
        });

        // Enter key support
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateQR();
            }
        });

        // Canvas roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            };
        }
    </script>
</body>
</html>
